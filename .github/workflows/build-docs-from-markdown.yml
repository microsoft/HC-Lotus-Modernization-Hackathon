name: Build Docs From Markdown

on:
  push:
    branches:
      - main
    paths:
      - "docs/*.md"
      - "scripts/build_docs.py"
      - ".github/workflows/build-docs-from-markdown.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install markdown

      - name: Build markdown-backed HTML docs
        run: python scripts/build_docs.py

      - name: Commit generated HTML (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          if git diff --cached --quiet; then
            echo "No generated docs changes detected."
          else
            git commit -m "chore(docs): rebuild markdown html [skip ci]"
            git push
          fi
